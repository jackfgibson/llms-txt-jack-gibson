# Runs the production image locally (or on any Docker host).
#
# Config comes from your .env.local (the same file `npm run dev` uses) — fill it
# in from .env.example first. Secrets are never baked into the image; they are
# injected here at runtime.
#
#   docker compose up --build
#
# The app talks to Neon over HTTPS, so no Postgres container is needed. Database
# migrations are run separately (npm run db:migrate against DATABASE_URL_UNPOOLED),
# not from this container.

services:
  app:
    build: .
    image: llms-txt-jack-gibson
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env.local
    environment:
      # Operational overrides — these take precedence over .env.local.
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      # A deployed container must use Inngest Cloud, never the local dev server.
      INNGEST_DEV: "0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
